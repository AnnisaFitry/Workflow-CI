name: CI MLflow Training

on:
push:
branches:
- main

permissions:
contents: write

jobs:
train-model:

runs-on: ubuntu-latest

steps:

# ==========================================
# Run actions/checkout@v3
# ==========================================

- name: Checkout Repository
  uses: actions/checkout@v3

# ==========================================
# Install Python 3.13.14
# ==========================================

- name: Setup Python 3.13
  uses: actions/setup-python@v5
  with:
    python-version: "3.13"

# ==========================================
# Check Environment
# ==========================================

- name: Check Environment
  run: |
    python --version
    pip --version

# ==========================================
# Install Dependencies
# ==========================================

- name: Install Dependencies
  run: |
    python -m pip install --upgrade pip
    pip install mlflow pandas numpy scikit-learn

# ==========================================
# Run MLflow Project
# ==========================================

- name: Run MLflow Project
  run: |
    mlflow run MLProject --env-manager local

# ==========================================
# Get Latest MLflow Run ID
# ==========================================

- name: Get Latest MLflow Run ID
  run: |
    python - <<EOF
    import mlflow
    import os

    client = mlflow.tracking.MlflowClient()

    experiments = client.search_experiments()

    latest_run = None

    for exp in experiments:
        runs = client.search_runs(
            experiment_ids=[exp.experiment_id],
            max_results=1,
            order_by=["start_time DESC"]
        )

        if runs:
            latest_run = runs[0]
            break

    if latest_run:
        run_id = latest_run.info.run_id

        with open("latest_run_id.txt", "w") as f:
            f.write(run_id)

        print("Latest Run ID:", run_id)
    else:
        print("No MLflow run found")
    EOF

# ==========================================
# Upload Result To Main Branch
# ==========================================

- name: Commit Run ID
  run: |
    git config --global user.name "github-actions[bot]"
    git config --global user.email "github-actions[bot]@users.noreply.github.com"

    git add latest_run_id.txt

    git commit -m "Update latest MLflow run ID [skip ci]" || echo "No changes"

    git push origin main

# ==========================================
# Complete Job
# ==========================================

- name: Complete Job
  run: echo "Workflow completed successfully"